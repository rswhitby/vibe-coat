<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />

    <!-- PWA / iOS -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Vibe Coat" />

    <title>Vibe Coat</title>
    <link rel="icon" href="icons/icon-192.png" />
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Splash screen -->
    <div id="splash">
      <div class="splash-lines">
        <span class="splash-line" style="--i:0">look around</span>
        <span class="splash-line" style="--i:1">key a color</span>
        <span class="splash-line" style="--i:2">make a vibe</span>
      </div>
      <div id="splash-logo">vibe.<span id="splash-coat">coat</span></div>
    </div>

    <!-- Camera feed (hidden — decoded for canvas compositing) -->
    <video
      id="video-cam"
      autoplay
      playsinline
      muted
      style="visibility:hidden;position:absolute;width:1px;height:1px"
    ></video>

    <!-- Overlay streams (invisible but decoded) -->
    <video id="video-green"  autoplay muted playsinline loop></video>
    <video id="video-blue"   autoplay muted playsinline loop></video>

    <!-- Full-screen compositing canvas -->
    <canvas id="output"></canvas>

    <!-- Vibe input bar -->
    <div id="vibe-bar">
      <input id="vibe-input" type="text" placeholder="Enter a vibe..." autocomplete="off" />
      <button id="vibe-send" aria-label="Send vibe">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"/>
          <polyline points="12 5 19 12 12 19"/>
        </svg>
      </button>
    </div>

    <!-- Settings panel (slides up from bottom) -->
    <div id="settings-panel" aria-hidden="true">
      <div class="settings-drag-handle"></div>
      <h2 class="settings-title">Settings</h2>
      <div class="settings-scroll">

        <div class="settings-section">
          <div class="settings-section-head">
            <span class="settings-section-dot" style="background:#3cff00"></span>Green
          </div>
          <div class="setting-row">
            <div class="slider-header"><label for="green-hmin">Hue Min</label><span class="slider-value" id="green-hmin-val">110</span></div>
            <input type="range" id="green-hmin" min="0" max="360" value="110" />
          </div>
          <div class="setting-row">
            <div class="slider-header"><label for="green-hmax">Hue Max</label><span class="slider-value" id="green-hmax-val">170</span></div>
            <input type="range" id="green-hmax" min="0" max="360" value="170" />
          </div>
          <div class="setting-row">
            <div class="slider-header"><label for="green-smin">Sat Min</label><span class="slider-value" id="green-smin-val">0.40</span></div>
            <input type="range" id="green-smin" min="0" max="100" value="40" />
          </div>
          <div class="setting-row">
            <div class="slider-header"><label for="green-smax">Sat Max</label><span class="slider-value" id="green-smax-val">1.00</span></div>
            <input type="range" id="green-smax" min="0" max="100" value="100" />
          </div>
        </div>

        <div class="settings-section">
          <div class="settings-section-head">
            <span class="settings-section-dot" style="background:#0011ff"></span>Blue
          </div>
          <div class="setting-row">
            <div class="slider-header"><label for="blue-hmin">Hue Min</label><span class="slider-value" id="blue-hmin-val">210</span></div>
            <input type="range" id="blue-hmin" min="0" max="360" value="210" />
          </div>
          <div class="setting-row">
            <div class="slider-header"><label for="blue-hmax">Hue Max</label><span class="slider-value" id="blue-hmax-val">240</span></div>
            <input type="range" id="blue-hmax" min="0" max="360" value="240" />
          </div>
          <div class="setting-row">
            <div class="slider-header"><label for="blue-smin">Sat Min</label><span class="slider-value" id="blue-smin-val">0.40</span></div>
            <input type="range" id="blue-smin" min="0" max="100" value="40" />
          </div>
          <div class="setting-row">
            <div class="slider-header"><label for="blue-smax">Sat Max</label><span class="slider-value" id="blue-smax-val">1.00</span></div>
            <input type="range" id="blue-smax" min="0" max="100" value="100" />
          </div>
        </div>

        <div class="setting-row setting-row--inline">
          <label>Test Overlay</label>
          <button id="btn-test" aria-label="Test overlay">TEST</button>
        </div>

      </div>
    </div>
    <div id="settings-backdrop"></div>

    <!-- Bottom toolbar -->
    <div id="toolbar">
      <!-- Chroma-key colour pickers -->
      <div id="controls">
        <button class="green"  data-color="green"></button>
        <button class="blue"   data-color="blue"></button>
      </div>

      <!-- Snapshot -->
      <button id="btn-snapshot" aria-label="Save snapshot">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
      </button>

      <!-- Settings -->
      <button id="btn-settings" aria-label="Settings">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06
                   a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09
                   A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83
                   l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09
                   A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83
                   l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09
                   a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83
                   l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09
                   a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>

    <script src="main.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/vibe-coat/sw.js').catch(console.warn);
        });
      }
    </script>
  </body>
</html>
